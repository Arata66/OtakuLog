<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>追番列表 | OtakuLog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: white;
            border-bottom: 2px solid #e0e0e0;
            padding: 35px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 8px;
            color: #2c2c2c;
            font-weight: 600;
        }

        .header p {
            font-size: 1em;
            color: #888;
        }

        .table-wrapper {
            padding: 30px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            background: #f9f9f9;
            border-bottom: 2px solid #e0e0e0;
            color: #2c2c2c;
            font-weight: 600;
            text-align: left;
        }

        th {
            padding: 15px;
            font-size: 0.95em;
            letter-spacing: 0.5px;
            color: #666;
        }

        tbody tr {
            border-bottom: 1px solid #f0f0f0;
            transition: all 0.2s ease;
        }

        tbody tr:hover {
            background: #fafafa;
        }

        td {
            padding: 15px;
            font-size: 0.95em;
            color: #333;
        }

        .status {
            padding: 5px 12px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.85em;
            display: inline-block;
            letter-spacing: 0.3px;
        }

        .status.watching {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status.finished {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .status.planning {
            background: #fff3e0;
            color: #e65100;
        }

        .status.dropped {
            background: #ffebee;
            color: #c62828;
        }

        .score {
            font-weight: 600;
            color: #ff6b6b;
            font-size: 1em;
        }

        .season {
            background: #f0f0f0;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.9em;
            color: #666;
        }

        tbody tr:nth-child(odd) {
            background: white;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        .footer {
            text-align: center;
            padding: 25px;
            color: #999;
            font-size: 0.9em;
            border-top: 1px solid #f0f0f0;
            background: #fafafa;
        }

        .empty-message {
            text-align: center;
            padding: 60px 40px;
            color: #999;
            font-size: 1.1em;
        }

        .search-filter {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .search-group {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-group label {
            font-weight: 600;
            color: #555;
            font-size: 0.9em;
            margin: 0;
        }

        .search-input,
        .filter-select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.9em;
            background: white;
            color: #333;
            transition: all 0.2s ease;
        }

        .search-input {
            width: 200px;
        }

        .filter-select {
            width: 130px;
        }

        .search-input:focus,
        .filter-select:focus {
            outline: none;
            border-color: #888;
            box-shadow: 0 0 4px rgba(136, 136, 136, 0.2);
        }

        .btn-reset {
            background: #888;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85em;
            transition: all 0.2s ease;
        }

        .btn-reset:hover {
            background: #666;
        }

        .add-anime-form {
            background: #fafafa;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 3px solid #888;
        }

        .add-anime-form h3 {
            margin-bottom: 20px;
            color: #2c2c2c;
            font-size: 1.1em;
            font-weight: 600;
        }

        .form-group {
            display: inline-block;
            margin-right: 15px;
            margin-bottom: 12px;
        }

        .form-group label {
            font-weight: 600;
            margin-right: 8px;
            color: #555;
            font-size: 0.9em;
        }

        .form-group input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.9em;
            width: 180px;
            transition: all 0.2s ease;
            background: white;
            color: #333;
        }

        .form-group input:focus {
            outline: none;
            border-color: #888;
            box-shadow: 0 0 4px rgba(136, 136, 136, 0.2);
            background: white;
        }

        .btn-add-anime {
            background: #333;
            color: white;
            border: none;
            padding: 9px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .btn-add-anime:hover {
            background: #555;
        }

        .btn-add-anime:active {
            transform: scale(0.98);
        }

        .btn-edit {
            background: #888;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            font-size: 0.85em;
            display: block;
            margin-bottom: 5px;
        }

        .btn-edit:hover {
            background: #666;
        }

        .btn-prev {
            background: #999;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            font-size: 0.85em;
            display: inline-block;
            margin-right: 5px;
        }

        .btn-prev:hover {
            background: #777;
        }

        .btn-next {
            background: #333;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            font-size: 0.85em;
            display: inline-block;
        }

        .btn-next:hover {
            background: #555;
        }

        .btn-save {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85em;
            margin-right: 5px;
            transition: all 0.2s ease;
        }

        .btn-save:hover {
            background: #27ae60;
        }

        .btn-cancel {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85em;
            transition: all 0.2s ease;
        }

        .btn-cancel:hover {
            background: #c0392b;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85em;
            transition: all 0.2s ease;
            display: inline-block;
            margin-left: 5px;
        }

        .btn-delete:hover {
            background: #c0392b;
        }

        .btn-cancel:hover {
            background: #c0392b;
        }

        .editable-name .edit-input,
        .editable-season .edit-input,
        .editable-score .edit-input,
        .editable-remark .edit-input {
            padding: 6px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.9em;
            width: 100%;
            background: white;
            color: #333;
        }

        .editable-name .edit-input {
            width: 150px;
        }

        .editable-season .edit-input {
            width: 100px;
        }

        .editable-score .edit-input {
            width: 70px;
        }

        .editable-remark .edit-input {
            width: 120px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎌 追番列表</h1>
            <p>动漫追踪系统 OtakuLog</p>
        </div>

        <div class="table-wrapper">
            <!-- 搜索/筛选框 -->
            <div class="search-filter">
                <div class="search-group">
                    <label for="searchName">🔍 搜索番剧：</label>
                    <input type="text" id="searchName" placeholder="输入番剧名称..." class="search-input">
                    
                    <label for="filterStatus" style="margin-left: 20px;">筛选状态：</label>
                    <select id="filterStatus" class="filter-select">
                        <option value="">全部</option>
                        <option value="watching">追中</option>
                        <option value="finished">已完成</option>
                        <option value="planning">计划</option>
                        <option value="dropped">放弃</option>
                    </select>
                    
                    <button class="btn-reset" onclick="resetSearch()">🔄 重置</button>
                </div>
            </div>

            <div class="add-anime-form">
                <h3>📝 添加新番</h3>
                <form id="animeForm" onsubmit="addAnime(event)">
                    <div class="form-group">
                        <label for="animeName">番剧名：</label>
                        <input type="text" id="animeName" name="name" placeholder="例：葬送的芙莉莲" required>
                    </div>
                    <div class="form-group">
                        <label for="totalEpisodes">总集数：</label>
                        <input type="number" id="totalEpisodes" name="totalEpisodes" placeholder="例：12" min="1" required>
                    </div>
                    <div class="form-group">
                        <label for="season">季度：</label>
                        <input type="text" id="season" name="season" placeholder="例：2024冬" required>
                    </div>
                    <div class="form-group">
                        <label for="score">评分：</label>
                        <input type="number" id="score" name="score" placeholder="例：8.5" min="0" max="10" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label for="remark">备注：</label>
                        <input type="text" id="remark" name="remark" placeholder="例：强烈推荐">
                    </div>
                    <button type="submit" class="btn-add-anime">✨ 添加</button>
                </form>
            </div>

            <div th:if="${#lists.isEmpty(animeList)}" class="empty-message">
                <p>还没有追番记录哦～快去添加一部吧</p>
            </div>

            <table th:if="${!#lists.isEmpty(animeList)}">
                <thead>
                    <tr>
                        <th>番号</th>
                        <th>作品名</th>
                        <th>季度</th>
                        <th>看番状态</th>
                        <th>评分</th>
                        <th>集数</th>
                        <th>备注</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="anime, iterStat : ${animeList}" th:id="'anime-row-' + ${anime.id}">
                        <td th:text="'#' + ${iterStat.count}"></td>
                        <td class="editable-name">
                            <span th:text="${anime.name}" class="display-text"></span>
                            <input type="text" class="edit-input" th:value="${anime.name}" style="display:none;">
                        </td>
                        <td class="editable-season">
                            <span class="season display-text" th:text="${anime.season}"></span>
                            <input type="text" class="edit-input" th:value="${anime.season}" style="display:none;">
                        </td>
                        <td>
                            <span th:class="'status ' + ${anime.status}" th:text="${anime.status}"></span>
                        </td>
                        <td class="editable-score">
                            <span class="score display-text" th:text="${anime.score}"></span>
                            <input type="number" class="edit-input" th:value="${anime.score}" step="0.1" min="0" max="10" style="display:none;">
                        </td>
                        <td th:text="${anime.currentEpisode} + ' / ' + ${anime.totalEpisodes}"></td>
                        <td class="editable-remark">
                            <span class="display-text" th:text="${anime.remark}"></span>
                            <input type="text" class="edit-input" th:value="${anime.remark}" style="display:none;">
                        </td>
                        <td>
                            <button class="btn-edit" th:onclick="'toggleEdit(' + ${anime.id} + ')'" title="编辑">
                                ✏️ 编辑
                            </button>
                            <button class="btn-prev" th:onclick="'prevEpisode(' + ${anime.id} + ', this)'" title="上一集">
                                ⬅️ 上集
                            </button>
                            <button class="btn-next" th:onclick="'nextEpisode(' + ${anime.id} + ', this)'" title="看下一集">
                                ➕ 下一集
                            </button>
                            <button class="btn-delete" th:onclick="'deleteAnime(' + ${anime.id} + ')'" title="删除">
                                🗑️ 删除
                            </button>
                            <div class="edit-actions" style="display:none; margin-top: 8px;">
                                <button class="btn-save" th:onclick="'saveEdit(' + ${anime.id} + ')'" title="保存">
                                    💾 保存
                                </button>
                                <button class="btn-cancel" th:onclick="'cancelEdit(' + ${anime.id} + ')'" title="取消">
                                    ❌ 取消
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="footer">
            <p th:text="'📊 总计: ' + ${#lists.size(animeList)} + ' 部作品 | 你的追番列表'"></p>
        </div>
    </div>

    <script>
        function nextEpisode(animeId, button) {
            // 发送POST请求到后端API
            fetch(`/api/anime/${animeId}/next-episode`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.text())
            .then(data => {
                if (data === 'success') {
                    // 刷新页面显示最新数据
                    location.reload();
                } else if (data === 'reached_max') {
                    alert('已经是最后一集了！');
                } else {
                    alert('更新失败，请重试');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('请求失败，请检查网络');
            });
        }

        function prevEpisode(animeId, button) {
            // 发送POST请求到后端API
            fetch(`/api/anime/${animeId}/prev-episode`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.text())
            .then(data => {
                if (data === 'success') {
                    // 刷新页面显示最新数据
                    location.reload();
                } else if (data === 'reached_min') {
                    alert('已经是第1集了！');
                } else {
                    alert('更新失败，请重试');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('请求失败，请检查网络');
            });
        }

        function addAnime(event) {
            event.preventDefault();  // 防止表单默认提交
            
            const formData = new FormData(document.getElementById('animeForm'));
            const params = new URLSearchParams(formData);
            
            fetch('/api/anime/add', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: params.toString()
            })
            .then(response => response.text())
            .then(data => {
                if (data === 'success') {
                    alert('添加成功！');
                    document.getElementById('animeForm').reset();  // 清空表单
                    location.reload();  // 刷新页面显示新番
                } else {
                    alert('添加失败，请检查输入信息');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('请求失败，请检查网络');
            });
        }

        function toggleEdit(animeId) {
            const row = document.getElementById(`anime-row-${animeId}`);
            const editBtn = row.querySelector('.btn-edit');
            const editActions = row.querySelector('.edit-actions');
            const editableFields = row.querySelectorAll('[class^="editable-"]');
            
            // 检查是否正在编辑
            const isEditing = editActions.style.display !== 'none';
            
            if (isEditing) {
                // 取消编辑
                cancelEdit(animeId);
            } else {
                // 进入编辑模式
                editableFields.forEach(field => {
                    const displayText = field.querySelector('.display-text');
                    const editInput = field.querySelector('.edit-input');
                    if (displayText && editInput) {
                        displayText.style.display = 'none';
                        editInput.style.display = 'inline-block';
                    }
                });
                
                editBtn.style.display = 'none';
                editActions.style.display = 'block';
            }
        }

        function saveEdit(animeId) {
            const row = document.getElementById(`anime-row-${animeId}`);
            
            const name = row.querySelector('.editable-name .edit-input').value;
            const season = row.querySelector('.editable-season .edit-input').value;
            const score = row.querySelector('.editable-score .edit-input').value;
            const remark = row.querySelector('.editable-remark .edit-input').value;
            
            // 验证输入
            if (!name.trim() || !season.trim() || !score) {
                alert('请填写所有必填字段');
                return;
            }
            
            const params = new URLSearchParams();
            params.append('name', name);
            params.append('season', season);
            params.append('score', score);
            params.append('remark', remark);
            
            fetch(`/api/anime/${animeId}/update`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: params.toString()
            })
            .then(response => response.text())
            .then(data => {
                if (data === 'success') {
                    alert('保存成功！');
                    location.reload();
                } else {
                    alert('保存失败，请重试');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('请求失败，请检查网络');
            });
        }

        function cancelEdit(animeId) {
            const row = document.getElementById(`anime-row-${animeId}`);
            const editBtn = row.querySelector('.btn-edit');
            const editActions = row.querySelector('.edit-actions');
            const editableFields = row.querySelectorAll('[class^="editable-"]');
            
            // 恢复显示模式
            editableFields.forEach(field => {
                const displayText = field.querySelector('.display-text');
                const editInput = field.querySelector('.edit-input');
                if (displayText && editInput) {
                    displayText.style.display = 'inline';
                    editInput.style.display = 'none';
                }
            });
            
            editBtn.style.display = 'block';
            editActions.style.display = 'none';
        }

        function deleteAnime(animeId) {
            // 确认删除
            if (confirm('确定要删除这个番剧吗？')) {
                fetch(`/api/anime/${animeId}`, {
                    method: 'DELETE'
                })
                .then(response => response.text())
                .then(data => {
                    if (data === 'success') {
                        // 删除成功，刷新页面
                        location.reload();
                    } else {
                        alert('删除失败：' + data);
                    }
                })
                .catch(error => {
                    console.error('删除出错：', error);
                    alert('删除出错');
                });
            }
        }

        // 搜索/筛选函数
        function performSearch() {
            const name = document.getElementById('searchName').value.trim();
            const status = document.getElementById('filterStatus').value;

            // 构建查询参数
            let url = '/api/anime/search?';
            if (name) {
                url += 'name=' + encodeURIComponent(name);
            }
            if (status) {
                url += (name ? '&' : '') + 'status=' + encodeURIComponent(status);
            }

            // 调用后端搜索API
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    updateTableWithResults(data);
                })
                .catch(error => {
                    console.error('搜索出错：', error);
                    alert('搜索出错');
                });
        }

        // 更新表格显示搜索结果
        function updateTableWithResults(animeList) {
            const tbody = document.querySelector('tbody');
            
            if (!tbody) return;

            // 清空表格
            tbody.innerHTML = '';

            if (animeList.length === 0) {
                // 没有结果，显示空消息
                const emptyMsg = document.querySelector('.empty-message');
                if (emptyMsg) {
                    emptyMsg.style.display = 'block';
                }
                const table = document.querySelector('table');
                if (table) {
                    table.style.display = 'none';
                }
                return;
            }

            // 有结果，显示表格
            const emptyMsg = document.querySelector('.empty-message');
            if (emptyMsg) {
                emptyMsg.style.display = 'none';
            }
            const table = document.querySelector('table');
            if (table) {
                table.style.display = 'table';
            }

            // 渲染搜索结果
            animeList.forEach((anime, index) => {
                const row = document.createElement('tr');
                row.id = `anime-row-${anime.id}`;
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td class="editable-name">
                        <span class="display-text">${anime.name}</span>
                        <input type="text" class="edit-input" value="${anime.name}" style="display:none;">
                    </td>
                    <td class="editable-season">
                        <span class="season display-text">${anime.season}</span>
                        <input type="text" class="edit-input" value="${anime.season}" style="display:none;">
                    </td>
                    <td>
                        <span class="status ${anime.status}">${anime.status}</span>
                    </td>
                    <td class="editable-score">
                        <span class="score display-text">${anime.score}</span>
                        <input type="number" class="edit-input" value="${anime.score}" step="0.1" min="0" max="10" style="display:none;">
                    </td>
                    <td>${anime.currentEpisode} / ${anime.totalEpisodes}</td>
                    <td class="editable-remark">
                        <span class="display-text">${anime.remark}</span>
                        <input type="text" class="edit-input" value="${anime.remark}" style="display:none;">
                    </td>
                    <td>
                        <button class="btn-edit" onclick="toggleEdit(${anime.id})" title="编辑">
                            ✏️ 编辑
                        </button>
                        <button class="btn-prev" onclick="prevEpisode(${anime.id}, this)" title="上一集">
                            ⬅️ 上集
                        </button>
                        <button class="btn-next" onclick="nextEpisode(${anime.id}, this)" title="看下一集">
                            ➕ 下一集
                        </button>
                        <button class="btn-delete" onclick="deleteAnime(${anime.id})" title="删除">
                            🗑️ 删除
                        </button>
                        <div class="edit-actions" style="display:none; margin-top: 8px;">
                            <button class="btn-save" onclick="saveEdit(${anime.id})" title="保存">
                                💾 保存
                            </button>
                            <button class="btn-cancel" onclick="cancelEdit(${anime.id})" title="取消">
                                ❌ 取消
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // 重置搜索
        function resetSearch() {
            document.getElementById('searchName').value = '';
            document.getElementById('filterStatus').value = '';
            location.reload();
        }

        // 初始化：给搜索框和筛选框添加事件监听
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('searchName');
            const filterSelect = document.getElementById('filterStatus');

            // 搜索框实时搜索（输入时触发）
            if (searchInput) {
                searchInput.addEventListener('input', performSearch);
            }

            // 筛选框实时过滤（变化时触发）
            if (filterSelect) {
                filterSelect.addEventListener('change', performSearch);
            }
        });
    </script>
</body>
</html>

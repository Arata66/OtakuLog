<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#122e8a">
    <link rel="manifest" th:href="@{/manifest.json}">
    <title>追番列表 | OtakuLog</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script th:src="@{/js/i18n.js}"></script>
    <link rel="stylesheet" th:href="@{/css/anime.css}">
</head>
<body>
    <div class="tw" id="tw"></div>
    <div class="mobile-nav"><div class="mobile-nav-inner">
        <button class="mobile-nav-btn active" onclick="switchTab('list');updateMobileNav(0)"><span class="mobile-nav-icon">☰</span>列表</button>
        <button class="mobile-nav-btn" onclick="switchTab('charts');updateMobileNav(1)"><span class="mobile-nav-icon">📊</span>图表</button>
        <button class="mobile-nav-btn" onclick="switchTab('calendar');updateMobileNav(2)"><span class="mobile-nav-icon">📅</span>日历</button>
        <button class="mobile-nav-btn" onclick="switchTab('timeline');updateMobileNav(3)"><span class="mobile-nav-icon">📈</span>时间线</button>
        <button class="mobile-nav-btn" onclick="document.querySelector('.add-form').scrollIntoView({behavior:'smooth'})"><span class="mobile-nav-icon">＋</span>添加</button>
    </div></div>
    <div class="batch-toolbar" id="batchToolbar">
        <span class="bt-count" id="batchCount" data-i18n="batch.selected">已选 0 项</span>
        <button class="bt-btn bt-del" onclick="batchDelete()" data-i18n="batch.delete">批量删除</button>
        <select id="batchStatusSelect" onchange="batchChangeStatus(this.value);this.value='';">
            <option value="" data-i18n="batch.changeStatus">批量改状态</option>
            <option value="watching" data-i18n="status.watching">追中</option>
            <option value="finished" data-i18n="status.finished">已完成</option>
            <option value="planning" data-i18n="status.planning">计划</option>
            <option value="dropped" data-i18n="status.dropped">放弃</option>
        </select>
        <button class="bt-btn bt-cancel" onclick="clearSelection()" data-i18n="batch.cancel">取消</button>
    </div>

    <div class="app">
        <!-- Header -->
        <div class="header">
            <div>
                <div class="logo">OtakuLog</div>
                <div class="logo-sub" data-i18n="app.subtitle">追番日记</div>
            </div>
            <div class="header-right">
                <button class="btn-h" id="langToggle" onclick="i18n.setLang(i18n.lang === 'zh' ? 'en' : 'zh')">EN</button>
                <button class="btn-h" id="themeToggle" onclick="toggleTheme()" title="切换主题">☽</button>
                <div style="position:relative;display:inline-block;">
                    <button class="btn-h" onclick="toggleSyncMenu()" id="syncBtn">☁ 同步</button>
                    <div id="syncMenu" style="display:none;position:absolute;right:0;top:100%;margin-top:4px;background:var(--card);border:1px solid var(--border-light);border-radius:10px;box-shadow:var(--shadow-lg);min-width:160px;z-index:50;overflow:hidden;">
                        <button class="sync-menu-btn" onclick="syncPush()">⬆ 推送到 WebDAV</button>
                        <button class="sync-menu-btn" onclick="syncPull()">⬇ 从 WebDAV 拉取</button>
                        <button class="sync-menu-btn" onclick="syncStatus()">ℹ 同步状态</button>
                        <button class="sync-menu-btn" onclick="batchMatchBangumi()" id="btnBatchMatch">🔗 补全 Bangumi 链接</button>
                    </div>
                </div>
                <button class="btn-h" onclick="exportData()">导出</button>
                <label class="btn-h" style="cursor:pointer;">导入 <input type="file" accept=".json" onchange="importData(event)" style="display:none;"></label>
                <form th:action="@{/logout}" method="post" style="display:inline;"><button type="submit" class="btn-h ghost">退出</button></form>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" data-i18n="tab.list" onclick="switchTab('list')">番剧列表</div>
            <div class="tab" data-i18n="tab.charts" onclick="switchTab('charts')">数据图表</div>
            <div class="tab" data-i18n="tab.calendar" onclick="switchTab('calendar')">日历</div>
            <div class="tab" data-i18n="tab.timeline" onclick="switchTab('timeline')">时间线</div>
        </div>

        <!-- ===== List ===== -->
        <div id="tab-list" class="tab-content active">
            <!-- Stats -->
            <div class="stats-row">
                <div class="s-card s-total"><div class="s-label" data-i18n="stat.total">总计</div><div class="s-num" id="stat-total">0</div></div>
                <div class="s-card s-watching"><div class="s-label" data-i18n="stat.watching">追中</div><div class="s-num" id="stat-watching">0</div></div>
                <div class="s-card s-finished"><div class="s-label" data-i18n="stat.finished">已完成</div><div class="s-num" id="stat-finished">0</div></div>
                <div class="s-card s-planning"><div class="s-label" data-i18n="stat.planning">计划</div><div class="s-num" id="stat-planning">0</div></div>
                <div class="s-card s-dropped"><div class="s-label" data-i18n="stat.dropped">放弃</div><div class="s-num" id="stat-dropped">0</div></div>
            </div>

            <div class="detail-row">
                <div class="d-card"><div class="d-label" data-i18n="stat.progress">进度</div><div class="d-val" id="stat-progress">0%</div><div class="d-sub" id="stat-episodes">0 / 0</div></div>
                <div class="d-card"><div class="d-label" data-i18n="stat.avgScore">均分</div><div class="d-val" id="stat-avg-score">0.0</div><div class="d-sub" data-i18n="stat.avgScoreSub">整体评价</div></div>
                <div class="d-card"><div class="d-label" data-i18n="stat.highScore">高分</div><div class="d-val" id="stat-high-score">0</div><div class="d-sub" data-i18n="stat.highScoreSub">>= 8.0</div></div>
                <div class="d-card"><div class="d-label" data-i18n="stat.mediumScore">中等</div><div class="d-val" id="stat-medium-score">0</div><div class="d-sub" data-i18n="stat.mediumScoreSub">6 ~ 8</div></div>
                <div class="d-card"><div class="d-label" data-i18n="stat.lowScore">低分</div><div class="d-val" id="stat-low-score">0</div><div class="d-sub" data-i18n="stat.lowScoreSub">< 6.0</div></div>
            </div>

            <!-- Search -->
            <div class="search-strip">
                <label data-i18n="search.label">搜索</label>
                <input type="text" id="searchName" data-i18n-placeholder="search.name" placeholder="输入番剧名称...">
                <label data-i18n="search.status">状态</label>
                <select id="filterStatus"><option value="" data-i18n="search.all">全部</option><option value="watching" data-i18n="status.watching">追中</option><option value="finished" data-i18n="status.finished">已完成</option><option value="planning" data-i18n="status.planning">计划</option><option value="dropped" data-i18n="status.dropped">放弃</option></select>
                <label data-i18n="search.sort">排序</label>
                <select id="sortBy"><option value="id-desc" data-i18n="search.sortNewest">最新添加</option><option value="score-desc" data-i18n="search.sortScoreHigh">评分高到低</option><option value="score-asc" data-i18n="search.sortScoreLow">评分低到高</option><option value="progress-desc" data-i18n="search.sortProgressHigh">进度高到低</option><option value="progress-asc" data-i18n="search.sortProgressLow">进度低到高</option><option value="name-asc" data-i18n="search.sortName">名称序</option><option value="sortOrder-asc" data-i18n="search.sortCustom">自定义排序</option></select>
                <label data-i18n="search.tag">标签</label>
                <input type="text" id="filterTag" data-i18n-placeholder="search.tagPlaceholder" placeholder="标签筛选" style="width:100px;">
                <div class="view-toggle">
                    <button class="view-btn active" id="viewTable" onclick="toggleView('table')" title="列表视图">&#9776;</button>
                    <button class="view-btn" id="viewDetail" onclick="toggleView('detail')" title="详情视图">&#9636;</button>
                    <button class="view-btn" id="viewGallery" onclick="toggleView('gallery')" title="封面墙">&#9638;</button>
                </div>
                <button class="btn-sm" data-i18n="search.reset" onclick="resetSearch()">重置</button>
            </div>

            <!-- Add -->
            <div class="add-form">
                <h3 data-i18n="form.add">添加新番</h3>
                <form id="animeForm" onsubmit="addAnime(event)">
                    <input type="hidden" id="animeBangumiId" value="">
                    <div class="form-grid">
                        <div class="form-row">
                            <div class="ff"><label data-i18n="form.name">番剧名</label><input type="text" id="animeName" data-i18n-placeholder="form.namePlaceholder" placeholder="输入名称后搜索" required></div>
                            <button type="button" class="btn-bangumi" id="btnBangumi" onclick="searchBangumi()" data-i18n="bangumi.search">Bangumi 搜索</button>
                            <button type="button" class="btn-bangumi" onclick="document.getElementById('traceMoeInput').click()" title="以图搜番">📷 搜图</button>
                            <input type="file" id="traceMoeInput" accept="image/*" style="display:none" onchange="searchTraceMoe(this)">
                        </div>
                        <div class="ff"><label data-i18n="form.totalEpisodes">总集数</label><input type="number" id="totalEpisodes" placeholder="12" min="1" required></div>
                        <div class="ff"><label data-i18n="form.season">季度</label><input type="text" id="animeSeason" placeholder="2024冬" required></div>
                        <div class="ff"><label data-i18n="form.score">评分</label><input type="number" id="animeScore" placeholder="8.5" min="0" max="10" step="0.1" required></div>
                        <div class="ff"><label data-i18n="form.cover">封面URL</label><input type="text" id="animeCover" data-i18n-placeholder="form.coverPlaceholder" placeholder="可选"></div>
                        <div class="ff"><label data-i18n="form.startDate">开播日期</label><input type="date" id="animeStartDate"></div>
                        <div class="ff"><label data-i18n="form.endDate">完结日期</label><input type="date" id="animeEndDate"></div>
                        <div class="ff"><label data-i18n="form.remark">备注 (Markdown)</label><textarea id="animeRemark" rows="2" data-i18n-placeholder="form.remarkPlaceholder" placeholder="支持 **Markdown**"></textarea></div>
                        <div class="ff"><label data-i18n="form.broadcastDay">放送日</label><select id="animeBroadcastDay"><option value="" data-i18n="form.broadcastDayUnset">未设置</option><option value="1" data-i18n="day.mon">周一</option><option value="2" data-i18n="day.tue">周二</option><option value="3" data-i18n="day.wed">周三</option><option value="4" data-i18n="day.thu">周四</option><option value="5" data-i18n="day.fri">周五</option><option value="6" data-i18n="day.sat">周六</option><option value="7" data-i18n="day.sun">周日</option></select></div>
                        <div class="ff"><label data-i18n="form.tags">标签</label><input type="text" id="animeTags" data-i18n-placeholder="form.tagsPlaceholder" placeholder="热血,奇幻"></div>
                        <div class="ff"><label>状态</label><select id="animeStatus"><option value="watching">追中</option><option value="planning">计划</option></select></div>
                        <div class="ff" style="flex-direction:row;align-items:center;gap:6px;">
                            <input type="checkbox" id="animeLegacy" style="width:auto;">
                            <label for="animeLegacy" style="text-transform:none;letter-spacing:0;font-size:0.82em;cursor:pointer;">旧番（不计入追番统计）</label>
                        </div>
                        <button type="submit" class="btn-add" data-i18n="form.submit">+ 添加</button>
                    </div>
                </form>
                <div class="bangumi-results" id="bangumiResults">
                    <div class="bangumi-header"><h4>Bangumi 搜索结果</h4><button class="btn-sm" onclick="closeBangumi()">关闭</button></div>
                    <div class="bangumi-grid" id="bangumiGrid"></div>
                </div>
            </div>

            <!-- Table (JS-rendered) -->
            <div class="table-card"><table><thead><tr><th style="width:28px;"></th><th style="width:36px;padding:12px 8px;text-align:center;"><input type="checkbox" class="batch-cb" id="selectAll" onclick="toggleSelectAll(this)"></th><th style="width:50px;"></th><th style="width:36px;">#</th><th>作品名</th><th style="width:90px;">季度</th><th style="width:90px;">状态</th><th style="width:70px;">评分</th><th style="width:100px;">集数</th><th style="max-width:160px;">备注</th><th style="width:180px;"></th></tr></thead><tbody></tbody></table></div>
            <div class="empty" id="emptySearch" style="display:none;"><div class="e-icon">~</div><p>还没有追番记录，快去添加一部吧</p></div>

            <!-- Detail -->
            <div class="detail-container" id="detailView">
                <div class="detail-grid" id="detailGrid"></div>
            </div>

            <!-- Gallery -->
            <div class="gallery-container" id="galleryView">
                <div class="gallery-grid" id="galleryGrid"></div>
            </div>

            <div class="pagination-indicator" id="paginationIndicator" style="display:none;"></div>
            <div id="scrollSentinel" style="height:1px;"></div>
        </div>

        <!-- ===== Charts ===== -->
        <div id="tab-charts" class="tab-content">
            <div class="charts-2">
                <div class="chart-card"><h4>状态分布</h4><canvas id="c1"></canvas></div>
                <div class="chart-card"><h4>评分分布</h4><canvas id="c2"></canvas></div>
            </div>
            <div class="chart-card"><h4>季度汇总</h4><div class="season-grid" id="sg"></div></div>
            <div class="charts-2">
                <div class="chart-card"><h4>年度对比</h4><canvas id="c-yoy"></canvas></div>
                <div class="chart-card"><h4>评分散布</h4><canvas id="c-hist"></canvas></div>
            </div>
            <div class="chart-card"><h4>标签统计</h4><canvas id="c-tags"></canvas></div>
            <div class="detail-row">
                <div class="d-card"><div class="d-label">日均集数</div><div class="d-val" id="stat-ep-day">-</div><div class="d-sub">观看习惯</div></div>
                <div class="d-card"><div class="d-label">月均集数</div><div class="d-val" id="stat-ep-month">-</div><div class="d-sub">观看习惯</div></div>
            </div>
        </div>

        <!-- ===== Calendar ===== -->
        <div id="tab-calendar" class="tab-content">
            <div class="cal-mode-bar">
                <button class="cal-mode-btn active" id="modeCal" onclick="switchCalMode('calendar')">放送日历</button>
                <button class="cal-mode-btn" id="modeSeason" onclick="switchCalMode('season')">本季新番</button>
                <button class="cal-mode-btn" id="modeRank" onclick="switchCalMode('rank')">排行榜</button>
            </div>
            <div id="calModeCalendar">
                <div class="chart-card">
                    <div class="cal-top-bar">
                        <h4 style="margin:0;">放送日历</h4>
                        <div class="cal-toggle">
                            <button class="cal-toggle-btn active" id="calViewMine" onclick="switchCalView('mine')">我的</button>
                            <button class="cal-toggle-btn" id="calViewAll" onclick="switchCalView('all')">本季</button>
                        </div>
                    </div>
                    <div class="cal-days" id="calDays"></div>
                    <div class="cal-content" id="calContent"></div>
                </div>
            </div>
            <div id="calModeSeason" style="display:none;">
                <div class="chart-card">
                    <div class="cal-top-bar">
                        <h4 style="margin:0;">本季新番</h4>
                        <div class="cal-toggle">
                            <button class="cal-toggle-btn active" onclick="loadSeasonAnime('rank')">排名</button>
                            <button class="cal-toggle-btn" onclick="loadSeasonAnime('date')">时间</button>
                        </div>
                    </div>
                    <div class="browse-grid" id="seasonGrid"></div>
                    <div class="browse-load-more" id="seasonLoadMore" style="display:none;"><button class="btn-sm" onclick="loadSeasonAnime(null,true)">加载更多</button></div>
                </div>
            </div>
            <div id="calModeRank" style="display:none;">
                <div class="chart-card">
                    <div class="cal-top-bar">
                        <h4 style="margin:0;">Bangumi 排行榜</h4>
                        <div class="cal-toggle">
                            <button class="cal-toggle-btn active" onclick="loadRankings('rank')">排名</button>
                            <button class="cal-toggle-btn" onclick="loadRankings('date')">时间</button>
                        </div>
                    </div>
                    <div class="browse-grid" id="rankGrid"></div>
                    <div class="browse-load-more" id="rankLoadMore" style="display:none;"><button class="btn-sm" onclick="loadRankings(null,true)">加载更多</button></div>
                </div>
            </div>
        </div>

        <!-- ===== Timeline ===== -->
        <div id="tab-timeline" class="tab-content">
            <div class="chart-card">
                <div class="cal-top-bar">
                    <h4 style="margin:0;" id="tlTitle">追番时间线</h4>
                    <div class="cal-toggle">
                        <button class="cal-toggle-btn active" id="tlViewWatch" onclick="switchTimelineMode('watch')">追番</button>
                        <button class="cal-toggle-btn" id="tlViewAir" onclick="switchTimelineMode('air')">开播</button>
                    </div>
                </div>
                <div class="timeline" id="tl"></div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/anime-app.js}"></script>
</body>
</html>

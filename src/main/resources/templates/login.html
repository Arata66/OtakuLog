<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OtakuLog</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #faf7f2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        /* Organic background shapes */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
        }
        body::before {
            width: 600px; height: 600px;
            top: -200px; right: -100px;
            background: radial-gradient(circle, rgba(255,180,150,0.18), transparent 70%);
        }
        body::after {
            width: 500px; height: 500px;
            bottom: -150px; left: -100px;
            background: radial-gradient(circle, rgba(160,200,180,0.15), transparent 70%);
        }
        .deco {
            position: fixed;
            width: 300px; height: 300px;
            top: 50%; left: 60%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(180,160,220,0.1), transparent 70%);
            pointer-events: none;
        }
        .login-card {
            position: relative; z-index: 1;
            width: 420px;
            background: white;
            border-radius: 24px;
            padding: 56px 44px;
            box-shadow: 0 4px 40px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.03);
            animation: rise 0.7s cubic-bezier(0.16,1,0.3,1);
        }
        @keyframes rise { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .brand { text-align: center; margin-bottom: 40px; }
        .brand h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 2.4em;
            color: #2d2a26;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }
        .brand p { font-size: 0.8em; color: #b0a89e; letter-spacing: 4px; text-transform: uppercase; font-weight: 500; }
        .field { margin-bottom: 22px; }
        .field label { display: block; font-size: 0.78em; color: #9a9088; margin-bottom: 8px; font-weight: 500; letter-spacing: 0.5px; }
        .field input {
            width: 100%; padding: 14px 16px;
            background: #faf7f2; border: 1.5px solid #ede8e0; border-radius: 12px;
            font-size: 0.95em; color: #2d2a26; font-family: inherit;
            transition: all 0.3s;
        }
        .field input:focus { outline: none; border-color: #d4a574; background: white; box-shadow: 0 0 0 4px rgba(212,165,116,0.08); }
        .field input::placeholder { color: #cdc5ba; }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            background: #2d2a26; color: white;
            font-size: 0.95em; font-weight: 600; cursor: pointer;
            transition: all 0.3s; font-family: inherit; margin-top: 8px;
            letter-spacing: 0.5px;
        }
        .btn:hover { background: #48433d; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(45,42,38,0.15); }
        .error-msg { background: #fef2f0; color: #c4533c; padding: 12px 16px; border-radius: 10px; margin-bottom: 16px; font-size: 0.85em; text-align: center; }
        .logout-msg { background: #f0faf4; color: #3a7d5c; padding: 12px 16px; border-radius: 10px; margin-bottom: 16px; font-size: 0.85em; text-align: center; }
        .hint { text-align: center; margin-top: 28px; font-size: 0.75em; color: #cdc5ba; }
    </style>
</head>
<body>
    <div class="deco"></div>
    <div class="login-card">
        <div class="brand">
            <h1>OtakuLog</h1>
            <p>anime journal</p>
        </div>
        <div th:if="${param.error}" class="error-msg">用户名或密码错误</div>
        <div th:if="${param.logout}" class="logout-msg">已退出登录</div>
        <form th:action="@{/login}" method="post">
            <div class="field"><label>用户名</label><input type="text" name="username" placeholder="admin" required autofocus></div>
            <div class="field"><label>密码</label><input type="password" name="password" placeholder="admin" required></div>
            <button type="submit" class="btn">登录</button>
        </form>
        <div class="hint">默认账号：admin / admin</div>
    </div>
</body>
</html>
